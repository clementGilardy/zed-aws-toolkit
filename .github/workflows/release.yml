name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wasm:
    name: Build WASM extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build WASM
        run: cargo build -p zed-aws-toolkit --target wasm32-wasip1 --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-wasm
          path: target/wasm32-wasip1/release/zed_aws_toolkit.wasm

  build-sidecar:
    name: Build sidecar (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: zed-aws-sidecar
            artifact: zed-aws-sidecar-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: zed-aws-sidecar
            artifact: zed-aws-sidecar-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: zed-aws-sidecar
            artifact: zed-aws-sidecar-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: zed-aws-sidecar
            artifact: zed-aws-sidecar-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build sidecar (Linux via cross)
        if: matrix.os == 'ubuntu-latest'
        run: cross build -p sidecar --target ${{ matrix.target }} --release

      - name: Build sidecar (macOS native)
        if: matrix.os == 'macos-latest'
        run: cargo build -p sidecar --target ${{ matrix.target }} --release

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    name: Create GitHub Release
    needs: [build-wasm, build-sidecar]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Rename artifacts for release
        run: |
          mv artifacts/extension-wasm/zed_aws_toolkit.wasm artifacts/zed_aws_toolkit.wasm
          mv artifacts/zed-aws-sidecar-linux-x86_64/zed-aws-sidecar artifacts/zed-aws-sidecar-linux-x86_64
          mv artifacts/zed-aws-sidecar-linux-aarch64/zed-aws-sidecar artifacts/zed-aws-sidecar-linux-aarch64
          mv artifacts/zed-aws-sidecar-macos-x86_64/zed-aws-sidecar artifacts/zed-aws-sidecar-macos-x86_64
          mv artifacts/zed-aws-sidecar-macos-aarch64/zed-aws-sidecar artifacts/zed-aws-sidecar-macos-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/zed_aws_toolkit.wasm
            artifacts/zed-aws-sidecar-linux-x86_64
            artifacts/zed-aws-sidecar-linux-aarch64
            artifacts/zed-aws-sidecar-macos-x86_64
            artifacts/zed-aws-sidecar-macos-aarch64
          generate_release_notes: true
