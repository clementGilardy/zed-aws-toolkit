name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wasm:
    name: Build WASM extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build WASM
        run: cargo build -p zed-aws-toolkit --target wasm32-wasip2 --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-wasm
          path: target/wasm32-wasip2/release/zed_aws_toolkit.wasm

  build-sidecar-linux-x86_64:
    name: Build sidecar (x86_64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build sidecar (native)
        run: cargo build -p sidecar --target x86_64-unknown-linux-gnu --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-aws-sidecar-linux-x86_64
          path: target/x86_64-unknown-linux-gnu/release/zed-aws-sidecar

  build-sidecar-linux-aarch64:
    name: Build sidecar (aarch64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install zigbuild
        run: cargo install cargo-zigbuild --locked

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Build sidecar (zigbuild)
        run: cargo zigbuild -p sidecar --target aarch64-unknown-linux-gnu --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zed-aws-sidecar-linux-aarch64
          path: target/aarch64-unknown-linux-gnu/release/zed-aws-sidecar

  build-sidecar-macos:
    name: Build sidecar (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            artifact: zed-aws-sidecar-macos-x86_64
          - target: aarch64-apple-darwin
            artifact: zed-aws-sidecar-macos-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build sidecar
        run: cargo build -p sidecar --target ${{ matrix.target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/zed-aws-sidecar

  release:
    name: Create GitHub Release
    needs: [build-wasm, build-sidecar-linux-x86_64, build-sidecar-linux-aarch64, build-sidecar-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release assets
        run: |
          mkdir -p dist
          cp artifacts/extension-wasm/zed_aws_toolkit.wasm dist/zed_aws_toolkit.wasm
          cp artifacts/zed-aws-sidecar-linux-x86_64/zed-aws-sidecar dist/zed-aws-sidecar-linux-x86_64
          cp artifacts/zed-aws-sidecar-linux-aarch64/zed-aws-sidecar dist/zed-aws-sidecar-linux-aarch64
          cp artifacts/zed-aws-sidecar-macos-x86_64/zed-aws-sidecar dist/zed-aws-sidecar-macos-x86_64
          cp artifacts/zed-aws-sidecar-macos-aarch64/zed-aws-sidecar dist/zed-aws-sidecar-macos-aarch64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/zed_aws_toolkit.wasm
            dist/zed-aws-sidecar-linux-x86_64
            dist/zed-aws-sidecar-linux-aarch64
            dist/zed-aws-sidecar-macos-x86_64
            dist/zed-aws-sidecar-macos-aarch64
          generate_release_notes: true
